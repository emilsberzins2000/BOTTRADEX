<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOTTRADEX V6 Scanner</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <a class="brand" href="index.html">
        <img src="assets/logo.png" alt="BOTTRADEX logo" onerror="this.style.display='none'">
        <div>BOTTRADEX <span class="muted">V6</span></div>
      </a>
      <div class="nav-links">
        <a href="index.html">Dashboard</a>
        <a href="market.html">Market</a>
        <a href="scanner.html">Scanner</a>
        <a href="watchlist.html">Watchlist</a>
        <a href="alerts.html">Alerts</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="login.html">Account</a>
      </div>
      <button id="nav-auth" class="secondary">Login</button>
    </div>
  </nav>
  <main class="page">
    <div class="container">
      
<section class="card pad">
  <div class="spread">
    <div>
      <div class="badge">Scanner</div>
      <h1 class="title" style="font-size:32px;margin-top:12px">Top crypto ideas</h1>
      <p class="subtitle">Fee-aware scanner built around real Binance prices and 24h stats.</p>
    </div>
    <button id="refresh-btn">Refresh</button>
  </div>
  <div class="table-wrap" style="margin-top:16px">
    <table>
      <thead><tr><th>Pair</th><th>Price</th><th>24h</th><th>Score</th><th>Signal</th><th>Reason</th></tr></thead>
      <tbody id="scan-table"></tbody>
    </table>
  </div>
</section>
<script>
async function loadScanner(){
  const body = document.getElementById('scan-table');
  body.innerHTML = '<tr><td colspan="6">Loading…</td></tr>';
  try{
    const user = getUser();
    let symbols = '';
    if(user){
      try{
        const wl = await api('/api/watchlist');
        symbols = (wl.pairs || []).join(',');
      }catch{}
    }
    const data = await api('/api/scanner' + (symbols ? ('?symbols=' + encodeURIComponent(symbols)) : ''));
    body.innerHTML = data.items.map(item => `
      <tr>
        <td>${item.symbol}</td>
        <td>${money(item.price)}</td>
        <td class="${Number(item.change24h)>=0?'positive':'negative'}">${pct(item.change24h)}</td>
        <td>${item.score}</td>
        <td class="${String(item.signal).toLowerCase()}">${item.signal}</td>
        <td>${item.reason}</td>
      </tr>`).join('');
  }catch(err){
    body.innerHTML = `<tr><td colspan="6">${err.message}</td></tr>`;
  }
}
document.getElementById('refresh-btn').onclick = loadScanner;
loadScanner();
connectSocket((msg) => { if(msg.type === 'prices') loadScanner(); });
</script>

    </div>
  </main>
  <div class="container footer">BOTTRADEX V6 · Binance market data · server watchlists, alerts, and live socket events.</div>
  <script src="app.js"></script>
  <script>navActive();</script>
</body>
</html>
